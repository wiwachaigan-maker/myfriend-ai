<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผังเมืองชุมชน</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; }
        .header { background: #1e293b; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid #334155; }
        .search-bar { padding: 10px; background: #1e293b; }
        .search-bar input { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 16px; }
        .map { position: relative; width: 100%; height: 70vh; background: #1e293b; overflow: hidden; }
        .zone { position: absolute; padding: 10px 15px; background: #334155; border: 2px solid #64748b; border-radius: 8px; cursor: pointer; }
        .market-zone { top: 40%; left: 50%; transform: translate(-50%, -50%); background: #7c3aed; border-color: #a78bfa; }
        .person-pin { position: absolute; width: 24px; height: 24px; background: #22c55e; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        .pin1 { top: 45%; left: 48%; }
        .pin2 { top: 42%; left: 52%; }
        .popup { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top: 2px solid #475569; padding: 20px; }
        .popup h3 { margin: 0 0 10px 0; }
        .chat-btn { background: #7c3aed; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-size: 16px; margin-top: 10px; }
        .close { float: right; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">ผังเมืองชุมชน</div>
    
    <div class="search-bar">
        <input type="text" placeholder="ค้นหาคน, ร้านค้าในชุมชน..." />
    </div>

    <div class="map">
        <!-- โซนตลาดชุมชน -->
        <div class="zone market-zone" onclick="showZone('ตลาดชุมชน')">
            ตลาดชุมชน
        </div>
        
        <!-- คนในตลาด - จุดเขียวๆ -->
        <div class="person-pin pin1" onclick="showPerson('คุณแดง','ร้านอาหาร')"></div>
        <div class="person-pin pin2" onclick="showPerson('คุณสมชาย','แผงผักสด')"></div>
    </div>

    <!-- ป๊อปอัพโปรไฟล์คน -->
    <div class="popup" id="personPopup">
        <span class="close" onclick="closePopup()">&times;</span>
        <h3 id="personName"></h3>
        <p id="personDetail"></p>
        <button class="chat-btn">เริ่มแชทกับ <span id="chatWith"></span></button>
    </div>

    <script>
        function showZone(zone) {
            alert('เข้ามาในโซน: ' + zone);
        }
        
        function showPerson(name, detail) {
            document.getElementById('personName').innerText = name;
            document.getElementById('personDetail').innerText = detail;
            document.getElementById('chatWith').innerText = name;
            document.getElementById('personPopup').style.display = 'block';
        }
        
        function closePopup() {
            document.getElementById('personPopup').style.display = 'none';
        }
    </script>
</body>
</html>
