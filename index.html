<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผังเมืองชุมชน</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Kanit', sans-serif; 
            color: white;
            /* ใส่รูปเกาะตรงนี้ เจ้าเมืองเอาลิงก์รูปมาแทนได้ */
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070') center/cover fixed; 
            min-height: 100vh;
        }
        .overlay { background: rgba(15, 23, 42, 0.7); min-height: 100vh; }
        .header { background: rgba(30, 41, 59, 0.9); padding: 15px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid #334155; backdrop-filter: blur(10px); }
        .search-bar { padding: 15px; }
        .search-bar input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #475569; 
            font-size: 16px; background: rgba(255,255,255,0.95); color: #1a1a1a;
        }
        .map { position: relative; width: 100%; height: 70vh; }
        .zone { 
            position: absolute; padding: 12px 20px; background: rgba(124, 58, 237, 0.9); 
            border: 2px solid #a78bfa; border-radius: 12px; cursor: pointer; 
            backdrop-filter: blur(5px); font-weight: bold;
        }
        .market-zone { top: 40%; left: 50%; transform: translate(-50%, -50%); }
        .person-pin { 
            position: absolute; width: 32px; height: 32px; background: #22c55e; 
            border-radius: 50%; border: 3px solid white; cursor: pointer; 
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
            transition: 0.3s;
        }
        .person-pin:hover { transform: scale(1.2); }
        .pin1 { top: 45%; left: 48%; }
        .pin2 { top: 42%; left: 52%; }
        .highlight { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); } 50% { box-shadow: 0 0 30px rgba(255, 215, 0, 1); } }
        
        .popup { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top: 3px solid #7c3aed; padding: 25px; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .popup h3 { margin: 0 0 10px 0; font-size: 1.4em; }
        .chat-btn { 
            background: linear-gradient(135deg, #7c3aed, #a78bfa); color: white; 
            padding: 14px; width: 100%; border: none; border-radius: 10px; 
            font-size: 16px; margin-top: 15px; font-weight: bold; cursor: pointer;
        }
        .close { float: right; font-size: 28px; cursor: pointer; }
        
        .chat-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 999; }
        .chat-header { background: #1e293b; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #334155; }
        .back-btn { font-size: 24px; cursor: pointer; }
        .chat-body { padding: 20px; height: calc(100vh - 120px); overflow-y: auto; }
        .msg { background: #334155; padding: 12px; border-radius: 10px; margin-bottom: 10px; max-width: 70%; }
        .chat-input { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #1e293b; display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border-radius: 8px; border: none; }
        .send-btn { background: #7c3aed; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="header">ผังเมืองชุมชน</div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="ค้นหาคน, ร้านค้าในชุมชน..." onkeypress="if(event.key==='Enter') searchPerson()" />
        </div>

        <div class="map">
            <div class="zone market-zone" onclick="showZone('ตลาดชุมชน')">ตลาดชุมชน</div>
            <div class="person-pin pin1" id="pin-ป้าแดง" onclick="showPerson('ป้าแดง','ร้านอาหาร - ลูกชิ้นทำเอง')"></div>
            <div class="person-pin pin2" id="pin-ลุงสมชาย" onclick="showPerson('ลุงสมชาย','แผงผักสด - ผักปลอดสาร')"></div>
        </div>

        <!-- ป๊อปอัพโปรไฟล์ -->
        <div class="popup" id="personPopup">
            <span class="close" onclick="closePopup()">&times;</span>
            <h3 id="personName"></h3>
            <p id="personDetail" style="color: #cbd5e1; margin-bottom: 5px;"></p>
            <button class="chat-btn" onclick="openChat()">💬 เริ่มแชทกับ <span id="chatWith"></span></button>
        </div>

        <!-- หน้าแชทจริง -->
        <div class="chat-page" id="chatPage">
            <div class="chat-header">
                <span class="back-btn" onclick="closeChat()">←</span>
                <div>
                    <div id="chatName" style="font-weight: bold;"></div>
                    <div style="font-size: 0.8em; color: #94a3b8;">ออนไลน์</div>
                </div>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="msg">สวัสดีครับ มีอะไรให้ช่วยไหม?</div>
            </div>
            <div class="chat-input">
                <input type="text" id="msgInput" placeholder="พิมพ์ข้อความ..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">ส่ง</button>
            </div>
        </div>
    </div>

    <script>
        let currentChatPerson = '';
        
        function searchPerson() {
            const query = document.getElementById('searchInput').value.trim();
            const allPins = document.querySelectorAll('.person-pin');
            allPins.forEach(pin => pin.classList.remove('highlight'));
            
            if (query === 'ป้าแดง' || query === 'คุณแดง') {
                const pin = document.getElementById('pin-ป้าแดง');
                pin.classList.add('highlight');
                pin.scrollIntoView({behavior: 'smooth', block: 'center'});
                setTimeout(() => showPerson('ป้าแดง','ร้านอาหาร - ลูกชิ้นทำเอง'), 500);
            } else if (query === 'ลุงสมชาย' || query === 'คุณสมชาย') {
                const pin = document.getElementById('pin-ลุงสมชาย');
                pin.classList.add('highlight');
                pin.scrollIntoView({behavior: 'smooth', block: 'center'});
                setTimeout(() => showPerson('ลุงสมชาย','แผงผักสด - ผักปลอดสาร'), 500);
            } else {
                alert('ไม่พบ: ' + query);
            }
        }
        
        function showZone(zone) {
            alert('เข้ามาในโซน: ' + zone);
        }
        
        function showPerson(name, detail) {
            currentChatPerson = name;
            document.getElementById('personName').innerText = name;
            document.getElementById('personDetail').innerText = detail;
            document.getElementById('chatWith').innerText = name;
            document.getElementById('personPopup').style.display = 'block';
        }
        
        function closePopup() {
            document.getElementById('personPopup').style.display = 'none';
        }
        
        function openChat() {
            document.getElementById('chatName').innerText = currentChatPerson;
            document.getElementById('chatPage').style.display = 'block';
            document.getElementById('personPopup').style.display = 'none';
        }
        
        function closeChat() {
            document.getElementById('chatPage').style.display = 'none';
        }
        
        function sendMsg() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            const chatBody = document.getElementById('chatBody');
            const newMsg = document.createElement('div');
            newMsg.className = 'msg';
            newMsg.style.marginLeft = 'auto';
            newMsg.style.background = '#7c3aed';
            newMsg.innerText = msg;
            chatBody.appendChild(newMsg);
            input.value = '';
            chatBody.scrollTop = chatBody.scrollHeight;
        }
    </script>
</body>
</html>
