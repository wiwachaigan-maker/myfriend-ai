<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Friend AI: Sakaeo Market</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 1 });
    const bounds = [[0, 0], [1000, 1000]];

    const videoElement = document.createElement('video');
    videoElement.src = 'my friend AI.mp4';
    videoElement.autoplay = true;
    videoElement.loop = true;
    videoElement.muted = true;
    videoElement.playsInline = true;
    videoElement.play();

    L.videoOverlay(videoElement, bounds, { opacity: 1 }).addTo(map);
    map.fitBounds(bounds);

    L.marker([500, 500]).addTo(map).bindPopup("<b>โซนตลาดนัด</b><br>กดเพื่อขายของ");
</script>
</body>
</html>
