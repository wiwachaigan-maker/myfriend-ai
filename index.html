<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Friend AI - เมืองปากดี</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #667eea; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .chat-container { width: 95%; max-width: 500px; height: 90vh; background: white; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #667eea; color: white; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; }
        .user-msg { background: #667eea; color: white; align-self: flex-end; }
        .bot-msg { background: #f1f1f1; color: black; align-self: flex-start; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #ddd; gap: 10px; }
        #userInput { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 25px; font-size: 16px; }
        #sendBtn { background: #667eea; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🏝️ My Friend AI - เวอร์ชั่นปากดี</div>
        <div class="chat-box" id="chatBox">
            <div class="msg bot-msg">ว่าไงเจ้าเมือง! อยากคุยอะไรก็พิมพ์มา 😎</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="พิมพ์มาคุยดิ..." />
            <button id="sendBtn">ส่ง</button>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const botReplies = ["เออดิ แล้วไงต่อ?", "พูดอีกก็ถูกอีกเจ้าเมือง", "อันนี้จริง ไม่เถียง", "ถามมาได้ เด๋วจัดให้", "เบาได้เบา หัวหน้า"];
        function addMsg(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', sender + '-msg');
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function botReply() {
            sendBtn.disabled = true;
            setTimeout(() => {
                const randomReply = botReplies[Math.floor(Math.random() * botReplies.length)];
                addMsg(randomReply, 'bot');
                sendBtn.disabled = false;
            }, 800);
        }
        function sendMsg() {
            const text = userInput.value.trim();
            if (text === '') return;
            addMsg(text, 'user');
            userInput.value = '';
            botReply();
        }
        sendBtn.addEventListener('click', sendMsg);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
